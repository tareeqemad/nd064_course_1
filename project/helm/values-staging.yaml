# Staging environment values for techtrends Helm chart
namespace:
  name: staging

replicaCount: 3

image:
  repository: techtrends
  tag: latest
  pullPolicy: IfNotPresent

containerPort: 3111

service:
  type: ClusterIP
  port: 5111
  targetPort: 3111
  protocol: TCP

resources:
  requests:
    cpu: "300m"
    memory: "90Mi"
  limits:
    cpu: "500m"
    memory: "128Mi"

livenessProbe:
  path: /healthz

readinessProbe:
  path: /healthz
