apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: techtrends-prod
  namespace: argocd
spec:
  project: default
  source:
    # IMPORTANT: Replace tareeqemad with your actual GitHub tareeqemad
    repoURL: https://github.com/tareeqemad/nd064_course_1.git
    targetRevision: HEAD
    path: project/helm
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
